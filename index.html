  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; overflow: hidden; }
    #header {
      padding: 12px 20px;
      background: linear-gradient(135deg, #16213e, #0f3460);
      border-bottom: 2px solid #e94560;
    }
    #header h1 { font-size: 1.15rem; font-weight: 700; color: #fff; }
    #header p { font-size: 0.75rem; color: #aac4de; margin-top: 2px; }
    #container { display: flex; height: calc(100vh - 58px); }
    #map { flex: 1; }
    #sidebar {
      width: 310px; min-width: 310px;
      background: #16213e;
      overflow-y: auto;
      border-left: 1px solid #0f3460;
      padding: 14px;
    }

    .placeholder { color: #7a8ba8; font-size: 0.82rem; margin-top: 16px; text-align: center; line-height: 1.6; }
    .dept-total { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 4px 0 12px; }
    .dept-total span { font-size: 0.8rem; color: #aac4de; font-weight: normal; }
    .activity-row { margin-bottom: 9px; }
    .activity-name { font-size: 0.72rem; color: #cce; margin-bottom: 2px; }
    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar { height: 13px; border-radius: 3px; min-width: 2px; }
    .bar-lbl { font-size: 0.7rem; color: #aac4de; white-space: nowrap; }
    #legend {
      background: #0f3460; border-radius: 6px;
      padding: 10px; margin-top: 14px;
    }
    #legend h3 { font-size: 0.75rem; color: #aac4de; margin-bottom: 6px; }
    .grad { height: 12px; border-radius: 3px; background: linear-gradient(to right, #cee5f2, #08589e); margin-bottom: 4px; }
    .grad-labels { display: flex; justify-content: space-between; font-size: 0.67rem; color: #7a8ba8; }
    .filter-wrap { margin-top: 12px; border-top: 1px solid #0f3460; padding-top: 12px; }
    .filter-wrap label { font-size: 0.75rem; color: #aac4de; display: block; margin-bottom: 5px; }
    select {
      width: 100%; background: #0f3460; color: #eee;
      border: 1px solid #e94560; border-radius: 4px;
      padding: 5px 8px; font-size: 0.78rem; cursor: pointer;
    }
    .leaflet-tooltip {
      background: rgba(15,20,40,0.95) !important;
      border: 1px solid #e94560 !important;
      color: #eee !important;
      border-radius: 6px !important;
      padding: 7px 11px !important;
      font-family: 'Segoe UI', Arial, sans-serif !important;
      font-size: 0.8rem !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
    }

    .tt-total { color: #aac4de; }
    .tt-act { color: #76B7B2; font-size: 0.74rem; margin-top: 2px; }
    .back-btn {
      display: inline-block; margin-bottom: 10px;
      font-size: 0.75rem; color: #aac4de; cursor: pointer;
      text-decoration: underline;
    }
    .back-btn:hover { color: #e94560; }
  </style>

const ACT_COLORS = {"Educación o salud privada": "#4E79A7", "Comercio": "#F28E2B", "Industria": "#E15759", "Agropecuaria, pesca o minería": "#76B7B2", "Construcción": "#59A14F", "Transporte o almacenamiento": "#EDC948", "Hotel o restaurante": "#B07AA1", "Banco, financiera o aseguradora": "#FF9DA7", "Empresa de electricidad, gas o agua": "#9C755F", "Otros servicios personales, técnicos o profesionales": "#BAB0AC"};

// Map init
const map = L.map('map', {zoomControl: true}).setView([-26.5, -60.3], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> | CENSO 2022',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// Color scale (light blue → dark blue)
function getColor(val, min, max) {
  if (max === min) return '#2a4a7a';
  const t = (val - min) / (max - min);
  const r = Math.round(206 + (8 - 206) * t);
  const g = Math.round(229 + (88 - 229) * t);
  const b = Math.round(242 + (158 - 242) * t);
  return `rgb(${r},${g},${b})`;
}

function getDeptVal(props, activity) {
  if (activity === 'total') return props.total;
  const a = (props.actividades || []).find(x => x.actividad === activity);
  return a ? a.casos : 0;
}

function computeRange(activity) {
  const vals = GEOJSON.features.map(f => getDeptVal(f.properties, activity));
  return [Math.min(...vals), Math.max(...vals)];
}

let [minVal, maxVal] = computeRange('total');
let selectedLayer = null;
const allLayers = [];

const geojsonLayer = L.geoJSON(GEOJSON, {
  style(feature) {
    const val = getDeptVal(feature.properties, 'total');
    return {
      fillColor: getColor(val, minVal, maxVal),
      fillOpacity: 0.82,
      color: '#0d1b2a',
      weight: 1.5
    };
  },
  onEachFeature(feature, layer) {
    const p = feature.properties;

    layer.bindTooltip(`
      <span class="tt-name">${p.nombre}</span>
      <span class="tt-total">Total: <b>${p.total.toLocaleString('es-AR')}</b> empleados</span>
      ${p.actividades && p.actividades[0] ? `<div class="tt-act">Principal: ${p.actividades[0].actividad}</div>` : ''}
    `, {sticky: true});

    layer.on({
      mouseover() {
        if (layer !== selectedLayer) layer.setStyle({weight: 2.5, color: '#e94560', fillOpacity: 0.95});
      },
      mouseout() {
        if (layer !== selectedLayer) {
          const activity = (document.getElementById('sel-activity') || {}).value || 'total';
          const val = getDeptVal(p, activity);
          layer.setStyle({fillColor: getColor(val, minVal, maxVal), fillOpacity: 0.82, color: '#0d1b2a', weight: 1.5});
        }
      },
      click() {
        if (selectedLayer && selectedLayer !== layer) {
          const prevP = selectedLayer.feature.properties;
          const activity = (document.getElementById('sel-activity') || {}).value || 'total';
          selectedLayer.setStyle({
            fillColor: getColor(getDeptVal(prevP, activity), minVal, maxVal),
            fillOpacity: 0.82, color: '#0d1b2a', weight: 1.5
          });
        }
        selectedLayer = layer;
        layer.setStyle({weight: 2.5, color: '#e94560', fillOpacity: 0.95});
        showSidebar(p);
        map.fitBounds(layer.getBounds(), {padding: [40, 40]});
      }
    });
    allLayers.push(layer);
  }
}).addTo(map);

map.fitBounds(geojsonLayer.getBounds());

function updateColors() {
  const activity = document.getElementById('sel-activity').value;
  [minVal, maxVal] = computeRange(activity);
  geojsonLayer.eachLayer(layer => {
    if (layer === selectedLayer) return;
    const val = getDeptVal(layer.feature.properties, activity);
    layer.setStyle({fillColor: getColor(val, minVal, maxVal), fillOpacity: 0.82, color: '#0d1b2a', weight: 1.5});
    layer.setTooltipContent(`
      <span class="tt-name">${layer.feature.properties.nombre}</span>
      <span class="tt-total">Total: <b>${layer.feature.properties.total.toLocaleString('es-AR')}</b> empleados</span>
      ${layer.feature.properties.actividades && layer.feature.properties.actividades[0]
        ? `<div class="tt-act">Principal: ${layer.feature.properties.actividades[0].actividad}</div>` : ''}
    `);
  });
}

function showSidebar(p) {
  const maxCasos = Math.max(...p.actividades.map(a => a.casos));
  const bars = p.actividades.map(a => {
    const w = Math.round((a.casos / maxCasos) * 175);
    const col = ACT_COLORS[a.actividad] || '#7a8ba8';
    return `<div class="activity-row">
      <div class="activity-name">${a.actividad}</div>
      <div class="bar-wrap">
        <div class="bar" style="width:${w}px;background:${col}"></div>
        <span class="bar-lbl">${a.casos.toLocaleString('es-AR')} (${a.pct}%)</span>
      </div>
    </div>`;
  }).join('');

  const curActivity = (document.getElementById('sel-activity') || {}).value || 'total';

  document.getElementById('sidebar-inner').innerHTML = `
    <span class="back-btn" onclick="resetSidebar()">← Volver al inicio</span>
    <h2>${p.nombre}</h2>
    <div class="dept-total">${p.total.toLocaleString('es-AR')} <span>empleados formales privados</span></div>
    ${bars}
    <div id="legend">
      <h3>Total empleados formales privados</h3>
      <div class="grad"></div>
      <div class="grad-labels"><span>Menos</span><span>Más</span></div>
    </div>
    <div class="filter-wrap">
      <label>Colorear mapa por:</label>
      <select id="sel-activity" onchange="updateColors()">
        <option value="total" ${curActivity==='total'?'selected':''}>Total (todas las actividades)</option>
        <option value="Educación o salud privada">Educación o salud privada</option>
        <option value="Comercio">Comercio</option>
        <option value="Industria">Industria</option>
        <option value="Agropecuaria, pesca o minería">Agropecuaria, pesca o minería</option>
        <option value="Construcción">Construcción</option>
        <option value="Transporte o almacenamiento">Transporte o almacenamiento</option>
        <option value="Hotel o restaurante">Hotel o restaurante</option>
        <option value="Banco, financiera o aseguradora">Banco, financiera o aseguradora</option>
        <option value="Empresa de electricidad, gas o agua">Electricidad, gas o agua</option>
        <option value="Otros servicios personales, técnicos o profesionales">Otros servicios técnicos/prof.</option>
      </select>
    </div>
  `;
}

function resetSidebar() {
  if (selectedLayer) {
    const activity = (document.getElementById('sel-activity') || {}).value || 'total';
    const val = getDeptVal(selectedLayer.feature.properties, activity);
    selectedLayer.setStyle({fillColor: getColor(val, minVal, maxVal), fillOpacity: 0.82, color: '#0d1b2a', weight: 1.5});
    selectedLayer = null;
  }
